# ShinkaEvolve config for TAA strategy optimisation
# Targets: CAGR > 15%, Calmar > 1.0
# Provider: Google Gemini only (GEMINI_API_KEY in .env)

max_evaluation_jobs: 2
max_proposal_jobs: 2
max_db_workers: 4

db_config:
  db_path: evolution_db.sqlite
  num_islands: 2
  archive_size: 50
  elite_selection_ratio: 0.3
  num_archive_inspirations: 4
  num_top_k_inspirations: 3
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  parent_selection_lambda: 10

evo_config:
  patch_types: [diff, full, cross]
  patch_type_probs: [0.5, 0.4, 0.1]
  num_generations: 300
  max_api_costs: 10.0
  max_patch_resamples: 3
  max_patch_attempts: 3
  max_novelty_attempts: 3
  job_type: local
  language: python

  # Gemini-only model pool (no OpenAI key required)
  llm_models:
    - "gemini-2.5-pro"
    - "gemini-2.5-flash"
    - "gemini-3-flash-preview"
  llm_kwargs:
    temperatures: [0.0, 0.7, 1.0]
    max_tokens: 32768
  llm_dynamic_selection: ucb1
  llm_dynamic_selection_kwargs:
    exploration_coef: 1.0

  meta_rec_interval: 25
  meta_llm_models: ["gemini-2.5-flash"]
  meta_llm_kwargs:
    temperatures: [0.0]
    max_tokens: 16384

  novelty_llm_models: ["gemini-2.5-flash-lite"]
  novelty_llm_kwargs:
    temperatures: [0.0]

  # Gemini embedding
  embedding_model: "gemini-embedding-001"
  code_embed_sim_threshold: 0.99

  init_program_path: initial.py
  results_dir: results/results_taa
